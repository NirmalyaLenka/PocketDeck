<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <rect width="800" height="520" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">PocketDeck - Wiring Diagram</text>
  <text x="400" y="44" text-anchor="middle" fill="#888" font-size="10">Raspberry Pi Pico + ST7735 TFT + 16 Buttons</text>

  <!-- ─── Pico board ─── -->
  <rect x="300" y="60" width="200" height="380" rx="8" fill="#2d2d5e" stroke="#6060a0" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" fill="#a0a0ff" font-size="13" font-weight="bold">Raspberry Pi Pico</text>

  <!-- Left pins (GP side) -->
  <!-- Pin labels inside Pico (left column) -->
  <text x="360" y="108" text-anchor="end" fill="#88ff88" font-size="9">3V3 (36)</text>
  <text x="360" y="124" text-anchor="end" fill="#ffcc44" font-size="9">GND (38)</text>
  <text x="360" y="140" text-anchor="end" fill="#44aaff" font-size="9">GP3 SPI-TX (5)</text>
  <text x="360" y="156" text-anchor="end" fill="#44aaff" font-size="9">GP4 SPI-SCK (6)</text>
  <text x="360" y="172" text-anchor="end" fill="#44aaff" font-size="9">GP5 RST (7)</text>
  <text x="360" y="188" text-anchor="end" fill="#44aaff" font-size="9">GP6 DC (9)</text>
  <text x="360" y="204" text-anchor="end" fill="#44aaff" font-size="9">GP7 CS (10)</text>

  <!-- Right pins (button GPIOs) -->
  <text x="440" y="108" fill="#ff8844" font-size="9">GP8  - BTN 1</text>
  <text x="440" y="124" fill="#ff8844" font-size="9">GP9  - BTN 2</text>
  <text x="440" y="140" fill="#ff8844" font-size="9">GP10 - BTN 3</text>
  <text x="440" y="156" fill="#ff8844" font-size="9">GP11 - BTN 4</text>
  <text x="440" y="172" fill="#ff8844" font-size="9">GP12 - BTN 5</text>
  <text x="440" y="188" fill="#ff8844" font-size="9">GP13 - BTN 6</text>
  <text x="440" y="204" fill="#ff8844" font-size="9">GP14 - BTN 7</text>
  <text x="440" y="220" fill="#ff8844" font-size="9">GP15 - BTN 8</text>
  <text x="440" y="236" fill="#ff8844" font-size="9">GP16 - BTN 9</text>
  <text x="440" y="252" fill="#ff8844" font-size="9">GP17 - BTN 10</text>
  <text x="440" y="268" fill="#ff8844" font-size="9">GP18 - BTN 11</text>
  <text x="440" y="284" fill="#ff8844" font-size="9">GP19 - BTN 12</text>
  <text x="440" y="300" fill="#ff8844" font-size="9">GP20 - BTN 13</text>
  <text x="440" y="316" fill="#ff8844" font-size="9">GP21 - BTN 14</text>
  <text x="440" y="332" fill="#ff8844" font-size="9">GP22 - BTN 15</text>
  <text x="440" y="348" fill="#ffff44" font-size="9">GP26 - BTN 16 (PROFILE)</text>

  <text x="440" y="380" fill="#888" font-size="9">GND (multiple)</text>

  <!-- ─── TFT Display ─── -->
  <rect x="60" y="70" width="140" height="170" rx="6" fill="#1a3a1a" stroke="#44aa44" stroke-width="2"/>
  <text x="130" y="92" text-anchor="middle" fill="#44ff44" font-size="12" font-weight="bold">ST7735 TFT</text>
  <text x="130" y="106" text-anchor="middle" fill="#888" font-size="9">1.8 inch  128x160</text>

  <text x="100" y="130" fill="#88ff88" font-size="10">VCC</text>
  <text x="100" y="148" fill="#ffcc44" font-size="10">GND</text>
  <text x="100" y="166" fill="#44aaff" font-size="10">SCL</text>
  <text x="100" y="184" fill="#44aaff" font-size="10">SDA</text>
  <text x="100" y="202" fill="#44aaff" font-size="10">RES</text>
  <text x="100" y="220" fill="#44aaff" font-size="10">DC</text>
  <text x="100" y="238" fill="#44aaff" font-size="10">CS</text>

  <!-- TFT to Pico wires -->
  <!-- VCC -->
  <line x1="136" y1="127" x2="300" y2="106" stroke="#88ff88" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- GND -->
  <line x1="136" y1="145" x2="300" y2="121" stroke="#ffcc44" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- SCL (GP4) -->
  <line x1="136" y1="163" x2="300" y2="153" stroke="#44aaff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- SDA (GP3) -->
  <line x1="136" y1="181" x2="300" y2="137" stroke="#44aaff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- RES (GP5) -->
  <line x1="136" y1="199" x2="300" y2="169" stroke="#44aaff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- DC (GP6) -->
  <line x1="136" y1="217" x2="300" y2="185" stroke="#44aaff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- CS (GP7) -->
  <line x1="136" y1="235" x2="300" y2="201" stroke="#44aaff" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ─── Button Grid ─── -->
  <rect x="590" y="70" width="180" height="270" rx="6" fill="#2a1a1a" stroke="#aa4444" stroke-width="2"/>
  <text x="680" y="90" text-anchor="middle" fill="#ff6666" font-size="12" font-weight="bold">4x4 Button Grid</text>

  <!-- 4x4 button visual -->
  <g fill="#444" stroke="#ff8844" stroke-width="1">
    <rect x="610" y="100" width="28" height="22" rx="3"/><text x="624" y="116" text-anchor="middle" fill="#fff" font-size="8">1</text>
    <rect x="646" y="100" width="28" height="22" rx="3"/><text x="660" y="116" text-anchor="middle" fill="#fff" font-size="8">2</text>
    <rect x="682" y="100" width="28" height="22" rx="3"/><text x="696" y="116" text-anchor="middle" fill="#fff" font-size="8">3</text>
    <rect x="718" y="100" width="28" height="22" rx="3"/><text x="732" y="116" text-anchor="middle" fill="#fff" font-size="8">4</text>

    <rect x="610" y="130" width="28" height="22" rx="3"/><text x="624" y="146" text-anchor="middle" fill="#fff" font-size="8">5</text>
    <rect x="646" y="130" width="28" height="22" rx="3"/><text x="660" y="146" text-anchor="middle" fill="#fff" font-size="8">6</text>
    <rect x="682" y="130" width="28" height="22" rx="3"/><text x="696" y="146" text-anchor="middle" fill="#fff" font-size="8">7</text>
    <rect x="718" y="130" width="28" height="22" rx="3"/><text x="732" y="146" text-anchor="middle" fill="#fff" font-size="8">8</text>

    <rect x="610" y="160" width="28" height="22" rx="3"/><text x="624" y="176" text-anchor="middle" fill="#fff" font-size="8">9</text>
    <rect x="646" y="160" width="28" height="22" rx="3"/><text x="660" y="176" text-anchor="middle" fill="#fff" font-size="8">10</text>
    <rect x="682" y="160" width="28" height="22" rx="3"/><text x="696" y="176" text-anchor="middle" fill="#fff" font-size="8">11</text>
    <rect x="718" y="160" width="28" height="22" rx="3"/><text x="732" y="176" text-anchor="middle" fill="#fff" font-size="8">12</text>

    <rect x="610" y="190" width="28" height="22" rx="3"/><text x="624" y="206" text-anchor="middle" fill="#fff" font-size="8">13</text>
    <rect x="646" y="190" width="28" height="22" rx="3"/><text x="660" y="206" text-anchor="middle" fill="#fff" font-size="8">14</text>
    <rect x="682" y="190" width="28" height="22" rx="3"/><text x="696" y="206" text-anchor="middle" fill="#fff" font-size="8">15</text>
    <rect x="718" y="190" width="28" height="22" rx="3" fill="#553300" stroke="#ffff44"/><text x="732" y="206" text-anchor="middle" fill="#ffff44" font-size="8">16</text>
  </g>

  <text x="680" y="232" text-anchor="middle" fill="#888" font-size="9">Each button: GPIO to GND</text>
  <text x="680" y="246" text-anchor="middle" fill="#888" font-size="9">10k resistor: GPIO to GND</text>
  <text x="680" y="264" text-anchor="middle" fill="#ffff44" font-size="9">BTN 16 = Profile Switch</text>
  <text x="680" y="278" text-anchor="middle" fill="#ff8844" font-size="9">GP8-GP22 and GP26</text>
  <text x="680" y="294" text-anchor="middle" fill="#888" font-size="9">Common GND for all buttons</text>

  <!-- Arrow from buttons to Pico right side -->
  <line x1="590" y1="160" x2="500" y2="230" stroke="#ff8844" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ─── Legend ─── -->
  <rect x="60" y="420" width="680" height="80" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="400" y="440" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">Legend</text>
  <line x1="80" y1="460" x2="120" y2="460" stroke="#88ff88" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="125" y="464" fill="#88ff88" font-size="10">3.3V power</text>
  <line x1="210" y1="460" x2="250" y2="460" stroke="#ffcc44" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="255" y="464" fill="#ffcc44" font-size="10">GND</text>
  <line x1="320" y1="460" x2="360" y2="460" stroke="#44aaff" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="365" y="464" fill="#44aaff" font-size="10">SPI data (display)</text>
  <line x1="490" y1="460" x2="530" y2="460" stroke="#ff8844" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="535" y="464" fill="#ff8844" font-size="10">Button signal</text>

  <text x="400" y="490" text-anchor="middle" fill="#666" font-size="9">NOTE: TFT VCC must connect to 3V3 pin (pin 36), NOT the 5V VBUS pin. 5V will damage the display.</text>
</svg>
